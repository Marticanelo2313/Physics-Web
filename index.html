<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>The Physics Web v18.1</title>

<style>
body { margin:0; overflow:hidden; background:#0f0f1a; font-family:Arial; }
canvas { display:block; }

#ui{
 position:fixed;
 top:10px; left:10px;
 background:rgba(0,0,0,0.85);
 padding:12px;
 border-radius:12px;
 color:white;
}

h1{
 position:fixed;
 top:10px;
 right:10px;
 color:white;
 font-size:18px;
}
</style>
</head>

<body>

<h1>THE PHYSICS WEB v18.1</h1>

<div id="ui">
<select id="mode">
<option value="sand">Arena</option>
<option value="water">Agua</option>
<option value="lava">Lava</option>
<option value="fire">Fuego</option>
<option value="electric">Electricidad</option>
<option value="bomb">💣 Bomba</option>
<option value="erase">🧽 Borrar</option>
</select>

<br><br>
Tamaño:
<input id="size" type="range" min="1" max="8" value="2">

<br><br>
<button id="resetBtn">Reset</button>
</div>

<canvas id="c"></canvas>

<script>

let c = document.getElementById("c");
let ctx = c.getContext("2d");

let s = 4;
let cols, rows;
let grid;

function resize(){
 c.width = innerWidth;
 c.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

// INIT GLOBAL (IMPORTANTE)
function init(){
 cols = Math.floor(c.width/s);
 rows = Math.floor(c.height/s);

 grid = Array.from({length:cols}, ()=>Array(rows).fill(null));

 for(let x=0;x<cols;x++){
  grid[x][rows-1] = "sand";
 }
}
init();

document.getElementById("resetBtn").onclick = init;

// INPUT
let mouse={x:0,y:0,down:false};
let mode="sand";
let size=2;

document.getElementById("mode").onchange=e=>mode=e.target.value;
document.getElementById("size").oninput=e=>size=parseInt(e.target.value);

window.addEventListener("mousemove",e=>{
 mouse.x=e.clientX;
 mouse.y=e.clientY;
});
window.addEventListener("mousedown",()=>mouse.down=true);
window.addEventListener("mouseup",()=>mouse.down=false);

// SAFE
function get(x,y){
 if(x<0||y<0||x>=cols||y>=rows) return null;
 return grid[x][y];
}
function set(x,y,v){
 if(x<0||y<0||x>=cols||y>=rows) return;
 grid[x][y]=v;
}

// BOMBA
function explode(cx,cy,r){
 for(let x=cx-r;x<cx+r;x++){
  for(let y=cy-r;y<cy+r;y++){
   let dx=x-cx, dy=y-cy;
   let d=Math.sqrt(dx*dx+dy*dy);
   if(d<r){
    let f=(r-d)/r;
    let nx=x+Math.round(dx*f*3);
    let ny=y+Math.round(dy*f*3);

    let cell=get(x,y);
    if(cell && get(nx,ny)!==null){
     set(nx,ny,cell);
     set(x,y,null);
    }
   }
  }
 }
}

// ELECTRICIDAD
function electric(x,y){
 let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
 for(let d of dirs){
  let nx=x+d[0], ny=y+d[1];
  if(get(nx,ny) && Math.random()<0.2){
   set(nx,ny,"electric");
  }
 }
}

// UPDATE
function update(){

 for(let y=rows-2;y>=0;y--){
  for(let x=0;x<cols;x++){

   let cell = grid[x][y];
   if(!cell) continue;

   let below = get(x,y+1);

   // ARENA
   if(cell==="sand"){
    if(!below){
     set(x,y+1,"sand");
     set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(!get(x+d,y+1)){
      set(x+d,y+1,"sand");
      set(x,y,null);
     }
    }
   }

   // AGUA
   if(cell==="water"){
    if(!below){
     set(x,y+1,"water");
     set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(!get(x+d,y)){
      set(x+d,y,"water");
      set(x,y,null);
     }
    }
   }

   // LAVA
   if(cell==="lava"){
    if(!below){
     set(x,y+1,"lava");
     set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(!get(x+d,y)){
      set(x+d,y,"lava");
      set(x,y,null);
     }
    }

    if(get(x,y+1)==="water"){
     set(x,y+1,"stone");
     set(x,y,"stone");
    }

    if(Math.random()<0.01){
     set(x,y,"fire");
    }
   }

   // FUEGO
   if(cell==="fire"){
    if(Math.random()<0.1){
     set(x,y,"smoke");
    }
   }

   // HUMO
   if(cell==="smoke"){
    if(!get(x,y-1)){
     set(x,y-1,"smoke");
     set(x,y,null);
    }
   }

   // ELECTRICIDAD
   if(cell==="electric"){
    electric(x,y);
    if(Math.random()<0.05){
     set(x,y,null);
    }
   }

  }
 }
}

// DRAW
function draw(){

 ctx.fillStyle="#0f0f1a";
 ctx.fillRect(0,0,c.width,c.height);

 for(let x=0;x<cols;x++){
  for(let y=0;y<rows;y++){

   let v = grid[x][y];
   if(!v) continue;

   ctx.fillStyle =
    v==="sand"?"#d2b48c":
    v==="water"?"cyan":
    v==="lava"?"orange":
    v==="fire"?"red":
    v==="smoke"?"rgba(200,200,200,0.4)":
    v==="electric"?"yellow":
    v==="stone"?"gray":"white";

   ctx.fillRect(x*s,y*s,s,s);
  }
 }
}

// TOOL
setInterval(()=>{

 if(!mouse.down) return;

 let gx=Math.floor(mouse.x/s);
 let gy=Math.floor(mouse.y/s);

 if(mode==="bomb"){
  explode(gx,gy,15);
  return;
 }

 for(let i=-size;i<=size;i++){
  for(let j=-size;j<=size;j++){

   if(mode==="erase"){
    set(gx+i,gy+j,null);
   } else {
    set(gx+i,gy+j,mode);
   }

  }
 }

},16);

// LOOP
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

</script>

</body>
</html>
