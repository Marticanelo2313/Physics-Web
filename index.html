<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>The Physics Web</title>

<style>
body { margin:0; overflow:hidden; background:#0f0f1a; font-family:Arial; }
canvas { display:block; }

#ui{
 position:fixed;
 top:10px; left:10px;
 background:rgba(0,0,0,0.8);
 padding:12px;
 border-radius:12px;
 color:white;
 box-shadow:0 0 10px rgba(0,0,0,0.5);
}

h1{
 position:fixed;
 top:10px;
 right:10px;
 color:white;
 font-size:18px;
}
</style>
</head>

<body>

<h1>THE PHYSICS WEB</h1>

<div id="ui">
<b>Material</b><br>
<select id="mode">
<option value="sand">Arena</option>
<option value="water">Agua</option>
<option value="lava">Lava</option>
<option value="electric">Electricidad</option>
<option value="bomb">💣 Bomba</option>
<option value="frag">💥 Frag</option>
<option value="inc">🔥 Incendiaria</option>
<option value="erase">🧽 Borrar</option>
</select>

<br><br>
<b>Gravedad</b><br>
<input id="g" type="range" min="0" max="2" step="0.1" value="1">
</div>

<canvas id="c"></canvas>

<script>
(() => {

const c = document.getElementById("c");
const ctx = c.getContext("2d");

function resize(){
 c.width = innerWidth;
 c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// GRID
const s = 4;
let cols, rows;
let grid;

function init(){
 cols = Math.floor(c.width/s);
 rows = Math.floor(c.height/s);

 grid = Array.from({length:cols}, ()=>Array(rows).fill(null));

 // suelo
 for(let x=0;x<cols;x++){
  grid[x][rows-1] = "sand";
 }
}
init();
addEventListener("resize", init);

// gravedad
let gravity = 1;
document.getElementById("g").oninput = e=>{
 gravity = parseFloat(e.target.value);
};

// input
let mouse = {x:0,y:0,down:false};
let mode = "sand";

document.getElementById("mode").onchange = e=>{
 mode = e.target.value;
};

addEventListener("mousemove", e=>{
 mouse.x = e.clientX;
 mouse.y = e.clientY;
});

addEventListener("mousedown", ()=>mouse.down = true);
addEventListener("mouseup", ()=>mouse.down = false);

// safe
function get(x,y){
 if(x<0||y<0||x>=cols||y>=rows) return null;
 return grid[x][y];
}
function set(x,y,v){
 if(x<0||y<0||x>=cols||y>=rows) return;
 grid[x][y] = v;
}

// explosión
function explode(cx,cy,r,type){

 for(let x=cx-r;x<cx+r;x++){
  for(let y=cy-r;y<cy+r;y++){

   let cell = get(x,y);
   if(!cell) continue;

   let dx=x-cx;
   let dy=y-cy;
   let d=Math.sqrt(dx*dx+dy*dy);

   if(d<r){

    let f=(r-d)/r;

    let nx=x+Math.round(dx*f*4);
    let ny=y+Math.round(dy*f*4);

    if(get(nx,ny)!==null){
     set(nx,ny,cell);
     set(x,y,null);
    }

    if(type==="frag") set(x,y,"electric");
    if(type==="inc") set(x,y,"fire");
   }
  }
 }
}

// electricidad
function spreadElectric(x,y){
 let dirs=[[1,0],[-1,0],[0,1],[0,-1]];

 for(let d of dirs){
  let nx=x+d[0], ny=y+d[1];
  if(get(nx,ny) && Math.random()<0.25){
   set(nx,ny,"electric");
  }
 }
}

// UPDATE
function update(){

 for(let y=rows-2;y>=0;y--){
  for(let x=0;x<cols;x++){

   let c = grid[x][y];
   if(!c) continue;

   let below = get(x,y+1);

   // arena
   if(c==="sand"){
    if(!below){
     set(x,y+1,"sand");
     set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(!get(x+d,y+1)){
      set(x+d,y+1,"sand");
      set(x,y,null);
     }
    }
   }

   // agua
   if(c==="water"){
    if(!below){
     set(x,y+1,"water");
     set(x,y,null);
    } else {
     let dirs=[-1,1];
     let d=dirs[Math.floor(Math.random()*2)];

     if(!get(x+d,y)){
      set(x+d,y,"water");
      set(x,y,null);
     }
    }
   }

   // lava
   if(c==="lava"){
    if(!below){
     set(x,y+1,"lava");
     set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(!get(x+d,y)){
      set(x+d,y,"lava");
      set(x,y,null);
     }
    }

    if(get(x,y+1)==="water"){
     set(x,y+1,"stone");
     set(x,y,"stone");
    }
   }

   // electricidad
   if(c==="electric"){
    spreadElectric(x,y);
    if(Math.random()<0.05) set(x,y,null);
   }

  }
 }
}

// draw
function draw(){

 ctx.fillStyle="#0f0f1a";
 ctx.fillRect(0,0,c.width,c.height);

 for(let x=0;x<cols;x++){
  for(let y=0;y<rows;y++){

   let v = grid[x][y];
   if(!v) continue;

   ctx.fillStyle =
    v==="sand"?"#d2b48c":
    v==="water"?"cyan":
    v==="lava"?"orange":
    v==="electric"?"yellow":
    v==="stone"?"gray":
    v==="fire"?"red":"white";

   ctx.fillRect(x*s,y*s,s,s);
  }
 }
}

// tool
setInterval(()=>{

 if(!mouse.down) return;

 let gx=Math.floor(mouse.x/s);
 let gy=Math.floor(mouse.y/s);

 if(mode==="erase"){
  set(gx,gy,null);
  return;
 }

 set(gx,gy,mode);

 if(mode==="bomb") explode(gx,gy,18,"bomb");
 if(mode==="frag") explode(gx,gy,18,"frag");
 if(mode==="inc") explode(gx,gy,18,"inc");

},16);

// loop
function loop(){
 update();
 draw();
 requestAnimationFrame(loop);
}
loop();

})();
</script>

</body>
</html>
