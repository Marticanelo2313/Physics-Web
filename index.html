<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>The Physics Web v29.7</title>

<style>
body { margin:0; overflow:hidden; background:#0f0f1a; font-family:Arial; }
canvas { display:block; }

#ui{
 position:fixed;
 top:10px; left:10px;
 background:rgba(0,0,0,0.85);
 padding:12px;
 border-radius:12px;
 color:white;
}

h1{
 position:fixed;
 top:10px;
 right:10px;
 margin:0;
 color:white;
 font-size:16px;
}

#credit{
 position:fixed;
 top:40px;
 right:10px;
 color:white;
 font-size:12px;
 opacity:0.7;
}
</style>
</head>

<body>

<h1>THE PHYSICS WEB v29.7</h1>
<div id="credit">Made by a guy named Martí</div>

<div id="ui">
<select id="mode">
<option value="sand">Arena</option>
<option value="dirt">🌍 Tierra</option>
<option value="water">Agua</option>
<option value="lava">Lava</option>
<option value="stone">🪨 Piedra</option>
<option value="plant">🌱 Planta</option>
<option value="sponge">🧽 Esponja</option>
<option value="fire">🔥 Fuego</option>
<option value="electric">⚡ Electricidad</option>
<option value="erase">Borrar</option>
</select>

<br><br>
Tamaño:
<input id="size" type="range" min="1" max="10" value="2">

<br><br>
<button id="save">Guardar</button>
<button id="load">Cargar</button>
<button id="reset">Reset</button>
</div>

<canvas id="c"></canvas>

<script>
(() => {

const c=document.getElementById("c");
const ctx=c.getContext("2d");

let s=4;
let cols,rows;
let g;
let wall;

// 🌗 DÍA/NOCHE
let dayTime=0;

// LLUVIA (igual que v29.6)
let rainActive=false;
let rainTimer=0;
let rainCooldown=120000;

// FPS
let lastTime=0;
const fpsLimit=60;
const interval=1000/fpsLimit;

// INIT
function init(){
 cols=Math.floor(innerWidth/s);
 rows=Math.floor(innerHeight/s);

 c.width=innerWidth;
 c.height=innerHeight;

 g=Array.from({length:cols},()=>Array(rows).fill(null));
 wall=Array.from({length:cols},()=>Array(rows).fill(false));

 for(let x=0;x<cols;x++){
  for(let y=0;y<rows;y++){
   if(x===0||y===0||x===cols-1||y===rows-1){
    wall[x][y]=true;
   }
  }
 }

 for(let x=1;x<cols-1;x++){
  g[x][rows-2]="stone";
 }

 rainActive=false;
 rainTimer=0;
 rainCooldown=120000;
}
init();

document.getElementById("reset").onclick=init;

// SAVE / LOAD
document.getElementById("save").onclick=()=>{
 localStorage.setItem("world",JSON.stringify(g));
};
document.getElementById("load").onclick=()=>{
 let data=localStorage.getItem("world");
 if(data) g=JSON.parse(data);
};

// INPUT
let mouse={x:0,y:0,down:false};
let mode="sand";
let brush=2;

document.getElementById("mode").onchange=e=>mode=e.target.value;
document.getElementById("size").oninput=e=>brush=parseInt(e.target.value);

addEventListener("mousemove",e=>{
 mouse.x=e.clientX;
 mouse.y=e.clientY;
});
addEventListener("mousedown",()=>mouse.down=true);
addEventListener("mouseup",()=>mouse.down=false);

// SAFE
function get(x,y){
 if(x<0||y<0||x>=cols||y>=rows) return "wall";
 if(wall[x][y]) return "wall";
 return g[x][y];
}
function set(x,y,v){
 if(x<=0||y<=0||x>=cols-1||y>=rows-1) return;
 if(wall[x][y]) return;
 g[x][y]=v;
}

// 🌧️ LLUVIA CONTROLADA (igual)
function handleRain(delta){

 if(rainActive){
  rainTimer += delta;

  for(let i=0;i<cols;i+=12){
   if(Math.random()<0.1){
    set(i,1,"water");
   }
  }

  if(rainTimer > 5000){
   rainActive=false;
   rainTimer=0;
   rainCooldown=120000;
  }

 } else {
  rainCooldown -= delta;
  if(rainCooldown <= 0){
   rainActive=true;
  }
 }
}

// ⚡ ELECTRICIDAD
function electric(x,y){
 let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
 for(let d of dirs){
  let nx=x+d[0], ny=y+d[1];
  let n=get(nx,ny);

  if(n && n!=="wall" && Math.random()<0.2){
   set(nx,ny,"electric");
  }
 }
 if(Math.random()<0.05){
  set(x,y,null);
 }
}

// 🌱 IA PLANTA
function growPlant(x,y){
 let hasWater=false;

 for(let dx=-2;dx<=2;dx++){
  for(let dy=-2;dy<=2;dy++){
   if(get(x+dx,y+dy)==="water"){
    hasWater=true;
   }
  }
 }

 if(hasWater && Math.random()<0.02){
  if(!get(x,y-1)){
   set(x,y-1,"plant");
  }
 }
}

// UPDATE
function update(delta){

 handleRain(delta);
 dayTime += delta * 0.00005;

 for(let y=rows-2;y>=1;y--){
  for(let x=1;x<cols-1;x++){

   let c=g[x][y];
   if(!c) continue;

   let below=get(x,y+1);

   // 🧪 FUSIONES

   // agua + arena → arena mojada
   if(c==="sand" && below==="water"){
    set(x,y,"wet_sand");
   }

   // lava + agua → piedra + humo
   if(c==="lava" && below==="water"){
    set(x,y,"stone");
    set(x,y+1,"stone");
    if(!get(x,y-1)) set(x,y-1,"smoke");
   }

   // ARENA
   if(c==="sand"){
    if(!below){
     set(x,y+1,"sand"); set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(get(x+d,y+1)==null){
      set(x+d,y+1,"sand"); set(x,y,null);
     }
    }
   }

   // TIERRA
   if(c==="dirt"){
    if(!below){
     set(x,y+1,"dirt"); set(x,y,null);
    } else if(Math.random()<0.3){
     let d=Math.random()<0.5?-1:1;
     if(get(x+d,y+1)==null){
      set(x+d,y+1,"dirt"); set(x,y,null);
     }
    }
   }

   // AGUA
   if(c==="water"){
    if(!below){
     set(x,y+1,"water"); set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(get(x+d,y)==null){
      set(x+d,y,"water"); set(x,y,null);
     }
    }
   }

   // LAVA
   if(c==="lava"){
    if(!below){
     set(x,y+1,"lava"); set(x,y,null);
    } else {
     let d=Math.random()<0.5?-1:1;
     if(get(x+d,y)==null){
      set(x+d,y,"lava"); set(x,y,null);
     }
    }
   }

   // HUMO
   if(c==="smoke"){
    if(!get(x,y-1)){
     set(x,y-1,"smoke"); set(x,y,null);
    } else if(Math.random()<0.05){
     set(x,y,null);
    }
   }

   // PLANTA
   if(c==="plant"){
    growPlant(x,y);
   }

   // FUEGO
   if(c==="fire"){
    let dirs=[[1,0],[-1,0],[0,1],[0,-1]];
    for(let d of dirs){
     let n=get(x+d[0],y+d[1]);
     if(n==="plant") set(x+d[0],y+d[1],"fire");
     if(n==="water") set(x+d[0],y+d[1],"smoke");
    }
    if(Math.random()<0.05) set(x,y,null);
   }

   // ESPONJA
   if(c==="sponge"){
    for(let dx=-2;dx<=2;dx++){
     for(let dy=-2;dy<=2;dy++){
      let n=get(x+dx,y+dy);
      if(n==="water"||n==="lava"){
       set(x+dx,y+dy,null);
      }
     }
    }
   }

   // ELECTRICIDAD
   if(c==="electric"){
    electric(x,y);
   }

  }
 }
}

// DRAW
function draw(){

 // 🌗 iluminación
 let b = Math.sin(dayTime)*0.5+0.5;
 ctx.fillStyle=`rgb(${20+50*b},${20+50*b},${40+80*b})`;
 ctx.fillRect(0,0,c.width,c.height);

 for(let x=0;x<cols;x++){
  for(let y=0;y<rows;y++){

   if(wall[x][y]){
    ctx.fillStyle="#222";
    ctx.fillRect(x*s,y*s,s,s);
    continue;
   }

   let v=g[x][y];
   if(!v) continue;

   ctx.fillStyle=
    v==="sand"?"#d2b48c":
    v==="wet_sand"?"#a58b6f":
    v==="dirt"?"#8b5a2b":
    v==="water"?"cyan":
    v==="lava"?"orange":
    v==="stone"?"#444":
    v==="plant"?"#00aa00":
    v==="sponge"?"yellow":
    v==="fire"?"red":
    v==="electric"?"yellow":
    v==="smoke"?"rgba(200,200,200,0.3)":"white";

   ctx.fillRect(x*s,y*s,s,s);
  }
 }
}

// TOOL
setInterval(()=>{
 if(!mouse.down) return;

 let gx=Math.floor(mouse.x/s);
 let gy=Math.floor(mouse.y/s);

 for(let i=-brush;i<=brush;i++){
  for(let j=-brush;j<=brush;j++){

   let x=gx+i, y=gy+j;

   if(wall[x]?.[y]) continue;

   if(mode==="erase"){
    set(x,y,null);
   } else {
    set(x,y,mode);
   }

  }
 }

},16);

// LOOP
function loop(t){
 requestAnimationFrame(loop);

 let delta = t - lastTime;
 if(delta < interval) return;

 lastTime = t;

 update(delta);
 draw();
}
loop();

})();
</script>

</body>
</html>
